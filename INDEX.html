<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaSwap Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter italic">PHARMASWAP</h1>
            <div class="hidden md:flex space-x-6 font-semibold">
                <button onclick="showSection('register')" class="hover:text-orange-400 transition">Εγγραφή</button>
                <button onclick="showSection('request')" class="hover:text-orange-400 transition">Νέο Αίτημα</button>
                <button onclick="showSection('tracking')" class="bg-orange-500 px-4 py-1 rounded-full hover:bg-orange-600">Tracking</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-8 p-4 max-w-3xl">
        
        <section id="register" class="section-content bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-blue-900 border-b pb-4">
                <i class="fas fa-user-medical mr-2"></i>Εγγραφή Φαρμακείου στο Δίκτυο
            </h2>
            <form id="regForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Επωνυμία Φαρμακείου</label>
                    <input type="text" id="name" required class="w-full border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Email (Επίσημο)</label>
                    <input type="email" id="email" required class="w-full border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Υπεύθυνος Φαρμακοποιός</label>
                    <input type="text" id="manager" required class="w-full border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">ΑΜ Υπεύθυνου (ΤΣΑΥ)</label>
                    <input type="text" id="am" required class="w-full border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">ΓΕΜΗ</label>
                    <input type="text" id="gemi" required class="w-full border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Διεύθυνση</label>
                    <input type="text" id="address" required class="w-full border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Πόλη</label>
                    <input type="text" id="city" required class="w-full border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">ΤΚ</label>
                    <input type="text" id="zip" required class="w-full border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Κινητό Τηλ.</label>
                    <input type="tel" id="mobile" required class="w-full border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Σταθερό Τηλ.</label>
                    <input type="tel" id="phone" class="w-full border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                </div>
                <button type="button" onclick="handleAction('register')" class="md:col-span-2 bg-blue-700 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-800 shadow-lg transition duration-300">
                    ΟΛΟΚΛΗΡΩΣΗ ΕΓΓΡΑΦΗΣ
                </button>
            </form>
        </section>

        <section id="request" class="section-content hidden bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-green-800 border-b pb-4">
                <i class="fas fa-search-plus mr-2"></i>Αίτημα Ελλειπτικού Φαρμάκου
            </h2>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Όνομα Φαρμάκου & Περιεκτικότητα</label>
                    <input type="text" id="drug" placeholder="π.χ. Ozempic 1mg" class="w-full border-2 p-3 rounded-lg outline-none">
                </div>
                
                <div class="bg-gray-50 p-5 rounded-xl border border-dashed border-gray-300">
                    <p class="font-bold text-gray-800 mb-3">Τρόπος Παραλαβής & Logistics</p>
                    <div class="space-y-3">
                        <label class="flex items-center p-2 bg-white rounded border cursor-pointer hover:bg-gray-50">
                            <input type="radio" name="delivery" value="pickup" class="w-4 h-4 text-blue-600">
                            <span class="ml-3 text-sm font-medium">Παραλαβή από το Φαρμακείο</span>
                        </label>
                        <label class="flex items-center p-2 bg-white rounded border cursor-pointer hover:bg-gray-50">
                            <input type="radio" name="delivery" value="courier" checked class="w-4 h-4 text-blue-600">
                            <span class="ml-3 text-sm font-medium">Αποστολή με Courier</span>
                        </label>
                    </div>

                    <div id="courier-options" class="mt-4 grid grid-cols-2 gap-2 text-xs font-bold text-gray-600">
                        <label class="flex items-center"><input type="checkbox" value="ACS" class="mr-1"> ACS</label>
                        <label class="flex items-center"><input type="checkbox" value="Geniki" class="mr-1"> ΓΕΝΙΚΗ ΤΑΧ.</label>
                        <label class="flex items-center"><input type="checkbox" value="Speedex" class="mr-1"> SPEEDEX</label>
                        <label class="flex items-center"><input type="checkbox" value="CourierCenter" class="mr-1"> COURIER CENTER</label>
                        <label class="flex items-center"><input type="checkbox" value="EasyMail" class="mr-1"> EASYMAIL</label>
                        <label class="flex items-center"><input type="checkbox" value="ELTA" class="mr-1"> ΕΛΤΑ COURIER</label>
                    </div>
                </div>

                <button type="button" onclick="handleAction('request')" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 shadow-lg">
                    ΔΗΜΟΣΙΕΥΣΗ & ΑΠΟΣΤΟΛΗ EMAIL
                </button>
            </div>
        </section>

        <section id="tracking" class="section-content hidden bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-orange-700 border-b pb-4">
                <i class="fas fa-truck-loading mr-2"></i>Ιχνηλασιμότητα (Tracking)
            </h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">QR CODE Φαρμάκου (Serial Number)</label>
                    <div class="flex gap-2">
                        <input type="text" id="qrcode" placeholder="Σκανάρετε ή πληκτρολογήστε τον κωδικό" class="w-full border-2 p-3 rounded-lg outline-none bg-gray-50">
                        <button class="bg-gray-800 text-white px-4 rounded-lg"><i class="fas fa-qrcode"></i></button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Αριθμός Voucher (Φορτωτική)</label>
                    <input type="text" id="voucher" placeholder="π.χ. 8234567890" class="w-full border-2 p-3 rounded-lg outline-none bg-gray-50">
                </div>
                <button type="button" onclick="alert('Τα στοιχεία καταχωρήθηκαν στο Google Sheet για ιχνηλασιμότητα.')" class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-orange-600 shadow-lg transition">
                    ΚΛΕΙΔΩΜΑ ΣΥΝΑΛΛΑΓΗΣ
                </button>
            </div>
        </section>

    </div>

    <script>
        const APP_URL = "https://script.google.com/macros/s/AKfycbwRKuJ-QmaCTvK427O7CN-1fcwG1HFBiFJUSh_6nUq_l53eoksdsKqTPHv1nPQaMgZ0/exec";

        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function handleAction(actionType) {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "Επεξεργασία...";
            btn.disabled = true;

            let payload = { action: actionType };

            if (actionType === 'register') {
                payload = {
                    ...payload,
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    manager: document.getElementById('manager').value,
                    am: document.getElementById('am').value,
                    gemi: document.getElementById('gemi').value,
                    address: document.getElementById('address').value,
                    city: document.getElementById('city').value,
                    zip: document.getElementById('zip').value,
                    mobile: document.getElementById('mobile').value,
                    phone: document.getElementById('phone').value
                };
            } else if (actionType === 'request') {
                const delivery = document.querySelector('input[name="delivery"]:checked').value;
                const couriers = Array.from(document.querySelectorAll('#courier-options input:checked')).map(c => c.value);
                payload = {
                    ...payload,
                    drug: document.getElementById('drug').value,
                    delivery: delivery,
                    couriers: couriers.join(", ")
                };
            }

            try {
                // Χρήση mode: 'no-cors' για αποφυγή προβλημάτων με το Google Script Redirect
                await fetch(APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify(payload)
                });
                
                alert("Η ενέργεια ολοκληρώθηκε επιτυχώς!");
                if(actionType === 'register') showSection('request');
            } catch (error) {
                console.error("Error:", error);
                alert("Σφάλμα σύνδεσης. Βεβαιωθείτε ότι έχετε κάνει Deploy το Script ως 'Anyone'.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
