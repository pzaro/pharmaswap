<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediX - PharmaSwap Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-gray-800 font-sans flex flex-col min-h-screen">

    <nav class="bg-blue-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center text-[10px] md:text-xs font-bold uppercase">
            <h1 class="text-xl italic font-black cursor-pointer" onclick="showSection('home')">MediX</h1>
            <div class="flex space-x-3 md:space-x-4">
                <button onclick="showSection('register')">Εγγραφη</button>
                <button onclick="showSection('profile')" class="text-orange-400">Το Προφιλ μου</button>
                <button onclick="showSection('request')">Νεο Αιτημα</button>
                <button onclick="showSection('my-requests')">Ιστορικο</button>
                <button onclick="showSection('tracking')" class="bg-orange-500 px-3 py-1 rounded-full">Tracking</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-8 p-4 max-w-4xl flex-grow mb-10">

        <section id="profile" class="section-content hidden bg-white p-8 rounded-3xl shadow-sm border">
            <h2 class="text-2xl font-bold mb-6 text-blue-900 border-b pb-4">Διαχείριση Στοιχείων</h2>
            
            <div id="profileSearch" class="text-center space-y-4">
                <p class="text-sm text-gray-500">Εισάγετε το email εγγραφής σας για να δείτε ή να αλλάξετε τα στοιχεία σας.</p>
                <input type="email" id="profileEmailSearch" placeholder="π.χ. info@pharmacy.gr" class="w-full border-2 p-4 rounded-xl text-center font-bold">
                <button onclick="loadProfile()" class="bg-blue-900 text-white px-8 py-3 rounded-xl font-bold w-full">ΕΜΦΑΝΙΣΗ ΠΡΟΦΙΛ</button>
            </div>

            <div id="profileEditForm" class="hidden mt-8 space-y-4">
                <input type="hidden" id="oldEmail">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2"><label class="text-[10px] font-bold text-gray-400 uppercase">Επωνυμία</label><input type="text" id="edit_name" class="w-full border p-3 rounded-xl bg-gray-50"></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase">Email (Νέο)</label><input type="email" id="edit_email" class="w-full border p-3 rounded-xl bg-gray-50"></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase">Κινητό</label><input type="tel" id="edit_mobile" class="w-full border p-3 rounded-xl bg-gray-50"></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase">Υπεύθυνος</label><input type="text" id="edit_manager" class="w-full border p-3 rounded-xl bg-gray-50"></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase">Πόλη</label><input type="text" id="edit_city" class="w-full border p-3 rounded-xl bg-gray-50"></div>
                </div>
                <button onclick="updateProfile(this)" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg">ΑΠΟΘΗΚΕΥΣΗ ΑΛΛΑΓΩΝ</button>
            </div>
        </section>

        </div>

    <script>
        const APP_URL = "https://script.google.com/macros/s/AKfycbwOm_3Rstw2ZKYgpE9VHxhdSM1f0CyjF3PhJSzf1sBH9R-XiJn8EED9G1JlWbDAUBVS/exec";

        // --- ΣΥΝΑΡΤΗΣΕΙΣ ΠΡΟΦΙΛ ---
        async function loadProfile() {
            const email = document.getElementById('profileEmailSearch').value.trim();
            if(!email) return alert("Παρακαλώ εισάγετε email.");
            
            try {
                const r = await fetch(APP_URL + "?action=getProfile&email=" + encodeURIComponent(email));
                const data = await r.json();
                if(data.error) return alert("Το email δεν βρέθηκε.");

                document.getElementById('profileSearch').classList.add('hidden');
                document.getElementById('profileEditForm').classList.remove('hidden');
                
                document.getElementById('oldEmail').value = data.email;
                document.getElementById('edit_name').value = data.name;
                document.getElementById('edit_email').value = data.email;
                document.getElementById('edit_mobile').value = data.mobile;
                document.getElementById('edit_manager').value = data.manager;
                document.getElementById('edit_city').value = data.city;
            } catch(e) { alert("Σφάλμα σύνδεσης."); }
        }

        async function updateProfile(btn) {
            const oldT = btn.innerText; btn.innerText = "⏳ Ενημέρωση..."; btn.disabled = true;
            let payload = {
                action: 'updateProfile',
                oldEmail: document.getElementById('oldEmail').value,
                name: document.getElementById('edit_name').value,
                email: document.getElementById('edit_email').value,
                mobile: document.getElementById('edit_mobile').value,
                manager: document.getElementById('edit_manager').value,
                city: document.getElementById('edit_city').value,
                // Πρόσθεσε εδώ και τα υπόλοιπα πεδία αν θες
            };

            try {
                await fetch(APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("✅ Το προφίλ σας ενημερώθηκε!");
                location.reload();
            } catch(e) { alert("Σφάλμα."); btn.disabled = false; btn.innerText = oldT; }
        }

        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
