<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaSwap Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans text-gray-800">

    <nav class="bg-blue-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic">PHARMASWAP</h1>
            <div class="flex space-x-2 text-[10px] md:text-sm font-bold uppercase">
                <button onclick="showSection('register')" class="hover:text-orange-400">Εγγραφή</button>
                <button onclick="showSection('request')" class="hover:text-orange-400">Νέο Αίτημα</button>
                <button onclick="showSection('my-requests')" class="hover:text-orange-400">Ιστορικό</button>
                <button onclick="showSection('tracking')" class="bg-orange-500 px-3 py-1 rounded-full">Tracking</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-8 p-4 max-w-3xl">
        
        <section id="register" class="section-content bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-blue-900 border-b pb-4">Εγγραφή Φαρμακείου</h2>
            <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2"><label class="text-xs font-bold text-gray-500 uppercase">Επωνυμία</label><input type="text" id="name" class="w-full border-2 p-3 rounded-lg outline-none focus:border-blue-500"></div>
                <div><label class="text-xs font-bold text-gray-500 uppercase">ΑΦΜ</label><input type="text" id="afm" class="w-full border-2 p-3 rounded-lg outline-none focus:border-blue-500"></div>
                <div><label class="text-xs font-bold text-gray-500 uppercase">Email</label><input type="email" id="email" class="w-full border-2 p-3 rounded-lg outline-none focus:border-blue-500"></div>
                <div><label class="text-xs font-bold text-gray-500 uppercase">Υπεύθυνος</label><input type="text" id="manager" class="w-full border-2 p-3 rounded-lg outline-none focus:border-blue-500"></div>
                <div><label class="text-xs font-bold text-gray-500 uppercase">ΑΜ ΤΣΑΥ</label><input type="text" id="am" class="w-full border-2 p-3 rounded-lg outline-none focus:border-blue-500"></div>
                <div><label class="text-xs font-bold text-gray-500 uppercase">ΓΕΜΗ</label><input type="text" id="gemi" class="w-full border-2 p-3 rounded-lg outline-none focus:border-blue-500"></div>
                <div class="md:col-span-2"><label class="text-xs font-bold text-gray-500 uppercase">Διεύθυνση</label><input type="text" id="address" class="w-full border-2 p-3 rounded-lg outline-none focus:border-blue-500"></div>
                <div><label class="text-xs font-bold text-gray-500 uppercase">Πόλη</label><input type="text" id="city" class="w-full border-2 p-3 rounded-lg outline-none focus:border-blue-500"></div>
                <div><label class="text-xs font-bold text-gray-500 uppercase">ΤΚ</label><input type="text" id="zip" class="w-full border-2 p-3 rounded-lg outline-none focus:border-blue-500"></div>
                <div><label class="text-xs font-bold text-gray-500 uppercase">Κινητό</label><input type="tel" id="mobile" class="w-full border-2 p-3 rounded-lg outline-none focus:border-blue-500"></div>
                <div><label class="text-xs font-bold text-gray-500 uppercase">Σταθερό</label><input type="tel" id="phone" class="w-full border-2 p-3 rounded-lg outline-none focus:border-blue-500"></div>
                
                <div class="md:col-span-2 mt-4 p-5 bg-blue-50 rounded-xl border border-blue-100 text-sm space-y-4">
                    <p class="text-blue-900 leading-relaxed italic">Το παρόν πρόγραμμα παρέχεται για <b>δωρεάν πρόσβαση</b> από τον <b>Παναγιώτη Ζαρογουλίδη</b>.</p>
                    <div class="space-y-2 pt-2 border-t border-blue-200">
                        <label class="flex items-start space-x-3 cursor-pointer"><input type="checkbox" id="promoConsent" checked class="mt-1 w-4 h-4 text-blue-600 rounded"><span>Συγκατάθεση Zarkolia Health</span></label>
                        <label class="flex items-start space-x-3 cursor-pointer"><input type="checkbox" id="gdprConsent" checked class="mt-1 w-4 h-4 text-blue-600 rounded"><span class="font-bold text-blue-900">Αποδοχή GDPR</span></label>
                    </div>
                </div>
                <button type="button" onclick="handleAction('register', this)" class="md:col-span-2 bg-blue-900 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-800 transition">ΕΓΓΡΑΦΗ</button>
            </form>
        </section>

        <section id="request" class="section-content hidden bg-white p-8 rounded-2xl shadow-sm border">
            <h2 class="text-2xl font-bold mb-6 text-green-800 border-b pb-4">Νέο Αίτημα</h2>
            <div class="space-y-4">
                <input type="email" id="reqEmail" placeholder="Το Email σας" class="w-full border-2 p-3 rounded-lg outline-none focus:border-green-500 font-bold">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <input type="text" id="drugBarcode" oninput="searchByBarcode()" placeholder="Barcode" class="border-2 p-3 rounded-lg bg-green-50 outline-none focus:border-green-500 font-bold">
                    <input type="text" id="drug" list="drugList" placeholder="Όνομα Φαρμάκου" class="md:col-span-2 border-2 p-3 rounded-lg outline-none focus:border-green-500 font-bold">
                    <datalist id="drugList"></datalist>
                </div>
                <div id="priceInfo" class="hidden p-4 bg-blue-50 border-2 border-blue-200 rounded-xl flex justify-between shadow-inner">
                    <div><span class="text-[10px] font-black text-blue-800 uppercase">ΧΤ</span><br><span id="dispXT" class="font-bold text-lg"></span></div>
                    <div class="text-right"><span class="text-[10px] font-black text-green-800 uppercase">ΛΤ</span><br><span id="dispLT" class="font-bold text-lg text-green-700"></span></div>
                </div>
                <input type="number" id="qty" placeholder="Ποσότητα" class="w-full border-2 p-3 rounded-lg outline-none">
                <button type="button" onclick="handleAction('request', this)" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg">ΔΗΜΟΣΙΕΥΣΗ</button>
            </div>
        </section>

        <section id="my-requests" class="section-content hidden bg-white p-8 rounded-2xl shadow-sm border">
            <h2 class="text-2xl font-bold mb-6 text-blue-900 border-b pb-4">Τα Αιτήματά μου</h2>
            <div class="flex gap-2 mb-6">
                <input type="email" id="searchEmail" placeholder="Το Email σας" class="flex-1 border-2 p-3 rounded-lg outline-none focus:border-blue-500">
                <button onclick="fetchMyRequests()" class="bg-blue-900 text-white px-6 rounded-lg font-bold">ΕΛΕΓΧΟΣ</button>
            </div>
            <div id="resultsArea" class="space-y-4"></div>
        </section>

        <section id="tracking" class="section-content hidden bg-white p-8 rounded-2xl shadow-sm border text-center">
            <h2 class="text-2xl font-bold mb-6 text-orange-700 border-b pb-4">Tracking</h2>
            <input type="text" id="trackReqId" placeholder="ID Αιτήματος" class="w-full border-2 p-3 rounded-lg mb-4 outline-none focus:border-orange-500">
            <input type="text" id="qrcode" placeholder="Serial Number (QR)" class="w-full border-2 p-3 rounded-lg mb-4 outline-none focus:border-orange-500">
            <button type="button" onclick="handleAction('tracking', this)" class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold">ΚΛΕΙΔΩΜΑ ΣΥΝΑΛΛΑΓΗΣ</button>
        </section>
    </div>

    <script>
        const APP_URL = "https://script.google.com/macros/s/AKfycbyiNZKKIuVzJwlP9j-JrzanCmn38G9hLtNdjgU43wc20VaWI7ZfQrQe5semYRP8GawE/exec";
        let drugsDatabase = [];

        window.addEventListener('DOMContentLoaded', async () => {
            const resp = await fetch(APP_URL + "?action=getDrugs");
            drugsDatabase = await resp.json();
            const dl = document.getElementById('drugList');
            drugsDatabase.forEach(d => { let opt = document.createElement('option'); opt.value = d.name; dl.appendChild(opt); });
        });

        function showSection(id) { 
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden')); 
            document.getElementById(id).classList.remove('hidden'); 
        }

        async function fetchMyRequests() {
            const email = document.getElementById('searchEmail').value.trim();
            if(!email) return alert("Βάλτε το email σας");
            const area = document.getElementById('resultsArea');
            area.innerHTML = "Αναζήτηση...";
            const r = await fetch(APP_URL + "?action=myRequests&email=" + email);
            const data = await r.json();
            if(data.length === 0) { area.innerHTML = "Δεν βρέθηκαν αιτήματα."; return; }
            area.innerHTML = data.map(req => `
                <div class="border-2 p-4 rounded-xl ${req.status === 'Βρέθηκε' ? 'bg-green-50 border-green-200' : 'bg-gray-50'}">
                    <div class="flex justify-between font-bold mb-1 italic"><span>ID: ${req.id}</span><span>${req.status}</span></div>
                    <div class="text-lg font-bold">${req.drug}</div>
                    ${req.status === 'Βρέθηκε' ? `<div class='mt-3 text-sm p-3 bg-white rounded-lg border border-green-200 font-bold text-green-800 italic'>✅ Καλύφθηκε από: ${req.helperName} (${req.helperEmail})</div>` : ''}
                </div>`).reverse().join('');
        }

        function searchByBarcode() {
            const bc = document.getElementById('drugBarcode').value.trim();
            const d = drugsDatabase.find(x => x.barcode == bc);
            if(d) {
                document.getElementById('drug').value = d.name;
                document.getElementById('priceInfo').classList.remove('hidden');
                document.getElementById('dispXT').innerText = parseFloat(d.xt.replace(',','.')).toFixed(2) + "€";
                document.getElementById('dispLT').innerText = parseFloat(d.lt.replace(',','.')).toFixed(2) + "€";
            }
        }

        document.getElementById('drug').oninput = function() {
            const d = drugsDatabase.find(x => x.name === this.value.trim());
            if(d) {
                document.getElementById('drugBarcode').value = d.barcode;
                document.getElementById('priceInfo').classList.remove('hidden');
                document.getElementById('dispXT').innerText = parseFloat(d.xt.replace(',','.')).toFixed(2) + "€";
                document.getElementById('dispLT').innerText = parseFloat(d.lt.replace(',','.')).toFixed(2) + "€";
            }
        };

        async function handleAction(type, btn) {
            const oldT = btn.innerText; btn.innerText = "Επεξεργασία..."; btn.disabled = true;
            let p = { action: type };
            if(type === 'register') {
                ['name','afm','email','manager','am','gemi','address','city','zip','mobile','phone'].forEach(f => p[f] = document.getElementById(f).value);
                p.promoConsent = document.getElementById('promoConsent').checked ? "ΝΑΙ" : "ΟΧΙ";
                p.gdprConsent = "ΑΠΟΔΟΧΗ";
            } else if(type === 'request') {
                p.requesterEmail = document.getElementById('reqEmail').value;
                p.qty = document.getElementById('qty').value;
                p.drugNameOnly = document.getElementById('drug').value;
                p.drug = p.drugNameOnly + " (XT: " + document.getElementById('dispXT').innerText + ")";
            } else if(type === 'tracking') { p.reqId = document.getElementById('trackReqId').value; p.qrcode = document.getElementById('qrcode').value; }

            await fetch(APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
            alert("Ολοκληρώθηκε!"); btn.innerText = oldT; btn.disabled = false;
        }
    </script>
</body>
</html>
