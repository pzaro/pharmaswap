<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaSwap Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter italic">PHARMASWAP</h1>
            <div class="hidden md:flex space-x-6 font-semibold">
                <button onclick="showSection('register')" class="hover:text-orange-400 transition">Εγγραφή</button>
                <button onclick="showSection('request')" class="hover:text-orange-400 transition">Νέο Αίτημα</button>
                <button onclick="showSection('tracking')" class="bg-orange-500 px-4 py-1 rounded-full hover:bg-orange-600">Tracking</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-8 p-4 max-w-3xl">
        
        <section id="register" class="section-content bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-blue-900 border-b pb-4">
                <i class="fas fa-user-medical mr-2"></i>Εγγραφή Φαρμακείου στο Δίκτυο
            </h2>
            <form id="regForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Επωνυμία Φαρμακείου</label>
                    <input type="text" id="name" required class="w-full border-2 p-3 rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Email (Επίσημο)</label>
                    <input type="email" id="email" required class="w-full border-2 p-3 rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Υπεύθυνος Φαρμακοποιός</label>
                    <input type="text" id="manager" required class="w-full border-2 p-3 rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">ΑΜ Υπεύθυνου (ΤΣΑΥ)</label>
                    <input type="text" id="am" required class="w-full border-2 p-3 rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">ΓΕΜΗ</label>
                    <input type="text" id="gemi" required class="w-full border-2 p-3 rounded-lg outline-none">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Διεύθυνση</label>
                    <input type="text" id="address" required class="w-full border-2 p-3 rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Πόλη</label>
                    <input type="text" id="city" required class="w-full border-2 p-3 rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">ΤΚ</label>
                    <input type="text" id="zip" required class="w-full border-2 p-3 rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Κινητό Τηλ.</label>
                    <input type="tel" id="mobile" required class="w-full border-2 p-3 rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Σταθερό Τηλ.</label>
                    <input type="tel" id="phone" class="w-full border-2 p-3 rounded-lg outline-none">
                </div>
                <button type="button" onclick="handleAction('register')" class="md:col-span-2 bg-blue-700 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-800 shadow-lg">
                    ΟΛΟΚΛΗΡΩΣΗ ΕΓΓΡΑΦΗΣ
                </button>
            </form>
        </section>

        <section id="request" class="section-content hidden bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-green-800 border-b pb-4">
                <i class="fas fa-search-plus mr-2"></i>Αίτημα Ελλειπτικού Φαρμάκου
            </h2>
            <div class="space-y-5">
                <div class="bg-blue-50 p-4 rounded-lg text-sm text-blue-800 mb-4">
                    <i class="fas fa-info-circle mr-1"></i> Υποβάλλετε το αίτημα. Μόλις βρεθεί το φάρμακο, θα συνεννοηθείτε με τον συνάδελφο για τον τρόπο αποστολής.
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Το Email σας (για να επικοινωνήσει μαζί σας ο συνάδελφος)</label>
                    <input type="email" id="reqEmail" placeholder="π.χ. info@pharmacy.gr" class="w-full border-2 p-3 rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Όνομα Φαρμάκου & Περιεκτικότητα</label>
                    <input type="text" id="drug" placeholder="π.χ. Ozempic 1mg" class="w-full border-2 p-3 rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Απαιτούμενη Ποσότητα</label>
                    <input type="number" id="qty" placeholder="π.χ. 2" class="w-full border-2 p-3 rounded-lg outline-none">
                </div>

                <button type="button" onclick="handleAction('request')" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 shadow-lg">
                    ΔΗΜΟΣΙΕΥΣΗ & ΑΠΟΣΤΟΛΗ EMAIL
                </button>
            </div>
        </section>

        <section id="tracking" class="section-content hidden bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-orange-700 border-b pb-4">
                <i class="fas fa-truck-loading mr-2"></i>Ιχνηλασιμότητα (Tracking)
            </h2>
            <div class="space-y-6">
                <div class="bg-gray-50 p-4 rounded-lg text-sm text-gray-600">
                    <p>Συμπληρώνεται από τον <strong>αποστολέα</strong> αφού έχει γίνει η συνεννόηση με τον παραλήπτη.</p>
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">ID Αιτήματος (Αν υπάρχει)</label>
                    <input type="text" id="trackReqId" placeholder="π.χ. REQ-12345" class="w-full border-2 p-3 rounded-lg outline-none bg-gray-50">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">QR CODE Φαρμάκου (Serial Number)</label>
                    <div class="flex gap-2">
                        <input type="text" id="qrcode" placeholder="Σκανάρετε ή πληκτρολογήστε τον κωδικό" class="w-full border-2 p-3 rounded-lg outline-none bg-gray-50">
                        <button class="bg-gray-800 text-white px-4 rounded-lg hover:bg-black"><i class="fas fa-qrcode"></i></button>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Τρόπος Αποστολής / Courier</label>
                        <select id="courierSent" class="w-full border-2 p-3 rounded-lg outline-none bg-gray-50">
                            <option value="Χέρι με Χέρι">Χέρι με Χέρι (Παραλαβή από κατάστημα)</option>
                            <option value="ACS">ACS Courier</option>
                            <option value="Geniki">Γενική Ταχυδρομική</option>
                            <option value="Speedex">Speedex</option>
                            <option value="ELTA">ΕΛΤΑ Courier</option>
                            <option value="Άλλο">Άλλη Μεταφορική</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Αριθμός Voucher (Αν στάλθηκε με courier)</label>
                        <input type="text" id="voucher" placeholder="Αριθμός φορτωτικής" class="w-full border-2 p-3 rounded-lg outline-none bg-gray-50">
                    </div>
                </div>

                <button type="button" onclick="handleAction('tracking')" class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-orange-600 shadow-lg">
                    ΚΛΕΙΔΩΜΑ ΣΥΝΑΛΛΑΓΗΣ
                </button>
            </div>
        </section>

    </div>

    <script>
        // Το URL παραμένει το ίδιο με αυτό που είχες
        const APP_URL = "https://script.google.com/macros/s/AKfycbxl4H9L3Y_0mPjMqJu3lb_GXk3zCNrfWUNhG4u7i45tEtsXLvTLOim-A8yaDKrFAGl2/exec";

        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function handleAction(actionType) {
            const btn = event.target.closest('button');
            const originalText = btn.innerText;
            btn.innerText = "Επεξεργασία...";
            btn.disabled = true;

            let payload = { action: actionType };

            if (actionType === 'register') {
                payload = {
                    ...payload,
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    manager: document.getElementById('manager').value,
                    am: document.getElementById('am').value,
                    gemi: document.getElementById('gemi').value,
                    address: document.getElementById('address').value,
                    city: document.getElementById('city').value,
                    zip: document.getElementById('zip').value,
                    mobile: document.getElementById('mobile').value,
                    phone: document.getElementById('phone').value
                };
            } else if (actionType === 'request') {
                // Το αίτημα τώρα στέλνει μόνο τα βασικά
                payload = {
                    ...payload,
                    requesterEmail: document.getElementById('reqEmail').value,
                    drug: document.getElementById('drug').value,
                    qty: document.getElementById('qty').value
                };
            } else if (actionType === 'tracking') {
                // Νέα λειτουργία: Καταγραφή του Tracking
                payload = {
                    ...payload,
                    reqId: document.getElementById('trackReqId').value,
                    qrcode: document.getElementById('qrcode').value,
                    courier: document.getElementById('courierSent').value,
                    voucher: document.getElementById('voucher').value
                };
            }

            try {
                await fetch(APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify(payload)
                });
                
                alert("Η ενέργεια ολοκληρώθηκε επιτυχώς!");
                
                // Καθαρισμός πεδίων
                if(actionType === 'register') showSection('request');
                if(actionType === 'request') {
                    document.getElementById('drug').value = '';
                    document.getElementById('qty').value = '';
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Σφάλμα σύνδεσης.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
