<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaSwap Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic">PHARMASWAP</h1>
            <div class="flex space-x-3 text-xs md:text-sm font-bold">
                <button onclick="showSection('register')" class="hover:text-orange-400">Εγγραφή</button>
                <button onclick="showSection('request')" class="hover:text-orange-400">Νέο Αίτημα</button>
                <button onclick="showSection('my-requests')" class="hover:text-orange-400">Τα Αιτήματά μου</button>
                <button onclick="showSection('tracking')" class="bg-orange-500 px-3 py-1 rounded-full">Tracking</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-8 p-4 max-w-3xl">
        
        <section id="my-requests" class="section-content hidden bg-white p-6 rounded-2xl shadow-sm border">
            <h2 class="text-xl font-bold mb-4 text-blue-900 border-b pb-2">Ιστορικό Αιτημάτων</h2>
            <div class="flex gap-2 mb-6">
                <input type="email" id="searchEmail" placeholder="Το Email σας" class="flex-1 border-2 p-3 rounded-lg outline-none">
                <button onclick="fetchMyRequests()" class="bg-blue-900 text-white px-6 rounded-lg font-bold">ΑΝΑΖΗΤΗΣΗ</button>
            </div>
            <div id="resultsArea" class="space-y-4">
                <p class="text-gray-400 text-center">Εισάγετε το email σας για να δείτε τα αποτελέσματα.</p>
            </div>
        </section>

        <section id="register" class="section-content bg-white p-8 rounded-2xl shadow-sm border">
            <h2 class="text-xl font-bold mb-6 text-blue-900 border-b pb-4">Εγγραφή Μέλους</h2>
            <div class="grid grid-cols-1 gap-4">
                <input type="text" id="name" placeholder="Επωνυμία Φαρμακείου" class="border-2 p-3 rounded-lg">
                <input type="text" id="afm" placeholder="ΑΦΜ" class="border-2 p-3 rounded-lg">
                <input type="email" id="email" placeholder="Email" class="border-2 p-3 rounded-lg">
                <div class="p-4 bg-blue-50 text-sm rounded-xl">
                    <p>Το παρόν πρόγραμμα παρέχεται <b>δωρεάν</b> από τον <b>Παναγιώτη Ζαρογουλίδη</b> (Φαρμακοποιός MSc MBA Διαμεσολαβητής).</p>
                    <label class="block mt-3"><input type="checkbox" id="promoConsent"> Συγκατάθεση Zarkolia Health</label>
                    <label class="block mt-1"><input type="checkbox" id="gdprConsent"> Αποδοχή GDPR</label>
                </div>
                <button onclick="handleAction('register', this)" class="bg-blue-900 text-white py-4 rounded-xl font-bold">ΟΛΟΚΛΗΡΩΣΗ ΕΓΓΡΑΦΗΣ</button>
            </div>
        </section>

        <section id="request" class="section-content hidden bg-white p-8 rounded-2xl shadow-sm border">
            <h2 class="text-xl font-bold mb-6 text-green-800 border-b pb-4">Υποβολή Αιτήματος</h2>
            <div class="space-y-4">
                <input type="email" id="reqEmail" placeholder="Το Email σας" class="w-full border-2 p-3 rounded-lg">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                    <input type="text" id="drugBarcode" oninput="searchByBarcode()" placeholder="Barcode" class="border-2 p-3 rounded-lg bg-green-50">
                    <input type="text" id="drug" list="drugList" placeholder="Όνομα Φαρμάκου" class="md:col-span-2 border-2 p-3 rounded-lg">
                    <datalist id="drugList"></datalist>
                </div>
                <div id="priceInfo" class="hidden p-4 bg-blue-50 border-2 border-blue-100 rounded-xl flex justify-between">
                    <div><span class="text-[10px] uppercase font-bold">ΧΤ</span><br><span id="dispXT" class="font-bold"></span></div>
                    <div><span class="text-[10px] uppercase font-bold">ΛΤ</span><br><span id="dispLT" class="font-bold"></span></div>
                </div>
                <input type="number" id="qty" placeholder="Ποσότητα" class="w-full border-2 p-3 rounded-lg">
                <button onclick="handleAction('request', this)" class="bg-green-700 text-white py-4 rounded-xl font-bold w-full">ΔΗΜΟΣΙΕΥΣΗ</button>
            </div>
        </section>

        <section id="tracking" class="section-content hidden bg-white p-8 rounded-2xl shadow-sm border">
            <h2 class="text-xl font-bold mb-6 text-orange-700 border-b pb-4 text-center italic">Tracking</h2>
            <input type="text" id="trackReqId" placeholder="ID Αιτήματος" class="w-full border-2 p-3 rounded-lg mb-4">
            <input type="text" id="qrcode" placeholder="Serial Number (QR)" class="w-full border-2 p-3 rounded-lg mb-4">
            <button onclick="handleAction('tracking', this)" class="bg-orange-500 text-white py-4 rounded-xl font-bold w-full">ΚΛΕΙΔΩΜΑ</button>
        </section>

    </div>

    <script>
        const APP_URL = "https://script.google.com/macros/s/AKfycby8E7yjP2iy2jwvQN7W7zMwcnYg8y55J9jw9rh7N9o4RSX_2CUa2IaHEbCcciby9g2u/exec";
        let drugsDatabase = [];

        window.addEventListener('DOMContentLoaded', async () => {
            const r = await fetch(APP_URL + "?action=getDrugs");
            drugsDatabase = await r.json();
            const dl = document.getElementById('drugList');
            drugsDatabase.forEach(d => { let o = document.createElement('option'); o.value = d.name; dl.appendChild(o); });
        });

        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function searchByBarcode() {
            const b = document.getElementById('drugBarcode').value;
            const d = drugsDatabase.find(x => x.barcode == b);
            if(d) {
                document.getElementById('drug').value = d.name;
                document.getElementById('priceInfo').classList.remove('hidden');
                document.getElementById('dispXT').innerText = d.xt + "€";
                document.getElementById('dispLT').innerText = d.lt + "€";
            }
        }

        async function fetchMyRequests() {
            const email = document.getElementById('searchEmail').value;
            const resArea = document.getElementById('resultsArea');
            resArea.innerHTML = "Αναζήτηση...";
            
            const r = await fetch(APP_URL + "?action=myRequests&email=" + email);
            const data = await r.json();
            
            if(data.length === 0) {
                resArea.innerHTML = "<p class='text-center'>Δεν βρέθηκαν αιτήματα για αυτό το email.</p>";
                return;
            }

            resArea.innerHTML = data.map(req => `
                <div class="border-2 p-4 rounded-xl ${req.status === 'Βρέθηκε' ? 'bg-green-50 border-green-200' : 'bg-gray-50'}">
                    <div class="flex justify-between font-bold">
                        <span>ID: ${req.id}</span>
                        <span class="${req.status === 'Βρέθηκε' ? 'text-green-700' : 'text-orange-600'}">${req.status}</span>
                    </div>
                    <div class="mt-1">${req.drug}</div>
                    ${req.status === 'Βρέθηκε' ? `<div class="mt-2 text-sm text-green-900 font-bold"><i class="fas fa-check-circle"></i> Καλύφθηκε από: ${req.helperName} (${req.helperEmail})</div>` : ''}
                </div>
            `).join('');
        }

        async function handleAction(type, btn) {
            btn.disabled = true;
            let p = { action: type };
            if(type === 'register') {
                ['name','afm','email'].forEach(f => p[f] = document.getElementById(f).value);
                p.promoConsent = document.getElementById('promoConsent').checked;
                p.gdprConsent = document.getElementById('gdprConsent').checked;
            } else if(type === 'request') {
                p.requesterEmail = document.getElementById('reqEmail').value;
                p.qty = document.getElementById('qty').value;
                p.drugNameOnly = document.getElementById('drug').value;
                p.drug = p.drugNameOnly + " [XT: " + document.getElementById('dispXT').innerText + "]";
            }
            await fetch(APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
            alert("Ολοκληρώθηκε!");
            btn.disabled = false;
        }
    </script>
</body>
</html>
