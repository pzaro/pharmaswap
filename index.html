<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediX - PharmaSwap Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        #drugSuggestions { position: absolute; z-index: 1000; background: white; border: 2px solid #16a34a; border-radius: 12px; max-height: 220px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.12); width: 100%; left: 0; top: 100%; }
        #drugSuggestions div { padding: 10px 16px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
        #drugSuggestions div:hover { background: #f0fdf4; font-weight: bold; }
        .drug-input-wrap { position: relative; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 font-sans flex flex-col min-h-screen">

    <nav class="bg-blue-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic cursor-pointer" onclick="showSection('home')">MediX</h1>
            <div class="flex space-x-3 md:space-x-4 text-[9px] md:text-xs font-bold uppercase flex-wrap justify-end">
                <button onclick="showSection('home')">Αρχικη</button>
                <button onclick="showSection('register')">Εγγραφη</button>
                <button onclick="showSection('request')">Νεο Αιτημα</button>
                <button onclick="showSection('my-requests')">Ιστορικο</button>
                <button onclick="showSection('tracking')" class="bg-orange-500 px-3 py-1 rounded-full shadow transition">Tracking</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-8 p-4 max-w-4xl flex-grow mb-10">

        <section id="home" class="section-content bg-white p-10 rounded-3xl shadow-sm border text-center">
            <h2 class="text-4xl font-black text-blue-900 mb-4">PharmaSwap Network</h2>
            <p class="text-gray-600 mb-8">Το δίκτυο αλληλεγγύης του Ελληνικού Φαρμακείου.</p>
            <button onclick="showSection('register')" class="bg-blue-900 text-white px-8 py-4 rounded-xl font-bold">ΞΕΚΙΝΗΣΤΕ ΕΔΩ</button>
        </section>

        <section id="register" class="section-content hidden bg-white p-8 rounded-3xl shadow-sm border">
            <h2 class="text-2xl font-bold mb-6 text-blue-900 border-b pb-4">Εγγραφή Φαρμακείου</h2>
            <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="name" placeholder="Επωνυμία" class="border p-3 rounded-xl bg-gray-50">
                <input type="text" id="afm" placeholder="ΑΦΜ" class="border p-3 rounded-xl bg-gray-50">
                <input type="email" id="email" placeholder="Email" class="border p-3 rounded-xl bg-gray-50">
                <input type="text" id="manager" placeholder="Υπεύθυνος Φαρμακοποιός" class="border p-3 rounded-xl bg-gray-50">
                <input type="text" id="am" placeholder="ΑΜ (ΤΣΑΥ)" class="border p-3 rounded-xl bg-gray-50">
                <input type="text" id="gemi" placeholder="ΓΕΜΗ" class="border p-3 rounded-xl bg-gray-50">
                <input type="text" id="address" placeholder="Διεύθυνση" class="border p-3 rounded-xl bg-gray-50 md:col-span-2">
                <input type="text" id="city" placeholder="Πόλη" class="border p-3 rounded-xl bg-gray-50">
                <input type="text" id="zip" placeholder="ΤΚ" class="border p-3 rounded-xl bg-gray-50">
                <input type="tel" id="mobile" placeholder="Κινητό" class="border p-3 rounded-xl bg-gray-50">
                <input type="tel" id="phone" placeholder="Σταθερό" class="border p-3 rounded-xl bg-gray-50">

                <div class="md:col-span-2 p-5 bg-gray-50 rounded-2xl border-2 border-gray-200 mt-4">
                    <label class="flex items-start gap-3 cursor-pointer mb-3">
                        <input type="checkbox" id="gdprConsent" class="w-5 h-5 accent-blue-700">
                        <span class="text-xs font-bold">Αποδέχομαι την επεξεργασία δεδομένων (GDPR) και τους Όρους Χρήσης.</span>
                    </label>
                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" id="promoConsent" class="w-5 h-5 accent-blue-700">
                        <span class="text-xs">Συναινώ στην αποστολή επιστημονικού υλικού.</span>
                    </label>
                </div>
                <button type="button" onclick="handleAction('register', this)" class="md:col-span-2 bg-blue-900 text-white py-4 rounded-xl font-bold shadow-lg">ΟΛΟΚΛΗΡΩΣΗ ΕΓΓΡΑΦΗΣ</button>
            </form>
        </section>

        <section id="request" class="section-content hidden bg-white p-8 rounded-3xl shadow-sm border">
            <h2 class="text-2xl font-bold mb-6 text-green-800 border-b pb-4">Υποβολή Αιτήματος</h2>
            <div class="space-y-4">
                <input type="email" id="reqEmail" placeholder="Email εγγραφής" class="w-full border p-4 rounded-xl bg-green-50/30">
                <input type="text" id="drugBarcode" placeholder="Barcode" class="w-full border p-4 rounded-xl text-center font-bold" oninput="searchByBarcode()">
                <div class="drug-input-wrap">
                    <input type="text" id="drug" placeholder="Όνομα φαρμάκου..." class="w-full border p-4 rounded-xl" oninput="onDrugInput(this.value)">
                    <div id="drugSuggestions" class="hidden"></div>
                </div>
                <div id="priceInfo" class="hidden p-5 bg-blue-50 border-2 rounded-2xl text-center">
                    <p id="selectedDrugName" class="text-xs font-bold mb-2"></p>
                    <div class="flex justify-around font-black">
                        <div>ΧΤ: <span id="dispXT"></span></div>
                        <div>ΛΤ: <span id="dispLT"></span></div>
                    </div>
                </div>
                <input type="number" id="qty" value="1" min="1" class="w-full border p-4 rounded-xl text-center">
                <button type="button" onclick="handleAction('request', this)" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg">ΔΗΜΟΣΙΕΥΣΗ</button>
            </div>
        </section>

        <section id="my-requests" class="section-content hidden bg-white p-8 rounded-3xl shadow-sm border">
            <h2 class="text-2xl font-bold mb-6 text-blue-900 border-b pb-4">Τα Αιτήματά μου</h2>
            <div class="flex gap-2 mb-6">
                <input type="email" id="searchEmail" placeholder="Email σας" class="flex-1 border p-4 rounded-xl">
                <button onclick="fetchMyRequests()" class="bg-blue-900 text-white px-8 rounded-xl font-bold">ΕΛΕΓΧΟΣ</button>
            </div>
            <div id="resultsArea" class="space-y-4"></div>
        </section>

        <section id="tracking" class="section-content hidden bg-white p-8 rounded-3xl shadow-sm border text-center">
            <h2 class="text-2xl font-bold mb-6 text-orange-700 border-b pb-4">Tracking</h2>
            <input type="text" id="trackReqId" placeholder="ID Αιτήματος" class="w-full border p-4 rounded-xl mb-4 font-bold text-center">
            <input type="text" id="qrcode" placeholder="Serial Number / Voucher" class="w-full border p-4 rounded-xl mb-4 text-center">
            <button type="button" onclick="handleAction('tracking', this)" class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold shadow-lg">ΚΑΤΑΧΩΡΗΣΗ</button>
        </section>

        <section id="terms" class="section-content hidden bg-white p-10 rounded-3xl shadow-sm border text-xs leading-relaxed">
            <h2 class="text-xl font-bold mb-4">Όροι Χρήσης & Αποποίηση Ευθυνών</h2>
            <p>Η πλατφόρμα MediX λειτουργεί ως διαμεσολαβητής επικοινωνίας...</p>
        </section>

    </div>

    <footer class="mt-auto border-t p-6 text-center bg-white">
        <p class="text-[10px] text-gray-500">&copy; 2026 MediX. Πρωτοβουλία: Παναγιώτης Ζαρογουλίδης.</p>
        <button onclick="showSection('terms')" class="text-blue-600 text-[10px] underline mt-1">Όροι Χρήσης</button>
    </footer>

    <script>
        const APP_URL = "https://script.google.com/macros/s/AKfycbyDKeIGHoGmCrCb3dDJHDDdWLCg3_SsmfV-HZ2Er8WE1c4c8uG6ICFYOkjroPXrgNiV/exec";
        let drugsDatabase = [];
        let selectedDrug = null;

        window.addEventListener('DOMContentLoaded', async () => {
            try { const resp = await fetch(APP_URL + "?action=getDrugs"); drugsDatabase = await resp.json(); } catch(err) {}
        });

        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function onDrugInput(val) {
            const box = document.getElementById('drugSuggestions');
            selectedDrug = null;
            document.getElementById('priceInfo').classList.add('hidden');
            if (val.length < 2) { box.classList.add('hidden'); return; }
            const q = val.toLowerCase();
            const matches = drugsDatabase.filter(d => d.name.toLowerCase().includes(q)).slice(0, 20);
            box.innerHTML = matches.map(d => `<div onmousedown="selectDrug('${d.barcode}')">${d.name}</div>`).join('');
            box.classList.remove('hidden');
        }

        function selectDrug(barcode) {
            const d = drugsDatabase.find(x => String(x.barcode) === String(barcode));
            if (!d) return;
            selectedDrug = d;
            document.getElementById('drug').value = d.name;
            document.getElementById('drugSuggestions').classList.add('hidden');
            fillDrugData(d);
        }

        function searchByBarcode() {
            const bc = document.getElementById('drugBarcode').value.trim();
            const d = drugsDatabase.find(x => String(x.barcode) === bc);
            if (d) { selectedDrug = d; document.getElementById('drug').value = d.name; fillDrugData(d); }
        }

        function fillDrugData(d) {
            document.getElementById('selectedDrugName').innerText = d.name;
            document.getElementById('dispXT').innerText = d.xt + " €";
            document.getElementById('dispLT').innerText = d.lt + " €";
            document.getElementById('priceInfo').classList.remove('hidden');
        }

        async function fetchMyRequests() {
            const email = document.getElementById('searchEmail').value.trim();
            const area = document.getElementById('resultsArea');
            area.innerHTML = "⏳...";
            const r = await fetch(APP_URL + "?action=myRequests&email=" + encodeURIComponent(email));
            const data = await r.json();
            area.innerHTML = data.reverse().map(req => `
                <div class="border p-4 rounded-2xl bg-gray-50">
                    <div class="font-bold">${req.drug} - ${req.status}</div>
                    ${req.helperPhone ? `<div class="text-blue-600 font-bold mt-2">Τηλ: ${req.helperPhone}</div>` : ''}
                </div>`).join('');
        }

        async function handleAction(type, btn) {
            if (type === 'register') {
                const email = document.getElementById('email').value.trim();
                const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!regex.test(email)) { alert("❌ Λάθος Email!"); return; }
                if (!document.getElementById('gdprConsent').checked) { alert("⚠️ Αποδεχτείτε τους όρους!"); return; }
            }

            const oldT = btn.innerText; btn.innerText = "⏳..."; btn.disabled = true;
            let p = { action: type };
            if (type === 'register') {
                ['name','afm','email','manager','am','gemi','address','city','zip','mobile','phone'].forEach(id => p[id] = document.getElementById(id).value.trim());
                p.gdprConsent = "ΑΠΟΔΟΧΗ";
            } else if (type === 'request') {
                p.requesterEmail = document.getElementById('reqEmail').value.trim();
                p.qty = document.getElementById('qty').value;
                p.drugNameOnly = selectedDrug.name;
                p.drug = selectedDrug.name + " (XT: " + selectedDrug.xt + ")";
            } else if (type === 'tracking') {
                p.reqId = document.getElementById('trackReqId').value.trim();
                p.qrcode = document.getElementById('qrcode').value.trim();
            }

            try {
                await fetch(APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
                alert("✅ Ολοκληρώθηκε!");
                if (type === 'register') showSection('request');
            } catch(err) { alert("❌ Σφάλμα"); }
            finally { btn.innerText = oldT; btn.disabled = false; }
        }
    </script>
</body>
</html>
