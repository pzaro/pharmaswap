<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediX - PharmaSwap Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-gray-800 font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic">MediX</h1>
            <div class="flex space-x-2 md:space-x-4 text-[10px] md:text-xs font-bold uppercase">
                <button onclick="showSection('register')" class="hover:text-orange-400">Εγγραφή</button>
                <button onclick="showSection('request')" class="hover:text-orange-400">Νέο Αίτημα</button>
                <button onclick="showSection('my-requests')" class="hover:text-orange-400">Ιστορικό</button>
                <button onclick="showSection('tracking')" class="bg-orange-500 px-3 py-1 rounded-full">Tracking</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-8 p-4 max-w-3xl mb-20">
        
        <section id="register" class="section-content bg-white p-8 rounded-3xl shadow-sm border">
            <h2 class="text-2xl font-bold mb-6 text-blue-900 border-b pb-4">Εγγραφή Φαρμακείου</h2>
            <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2"><label class="text-[10px] font-bold text-gray-400 uppercase">Επωνυμία</label><input type="text" id="name" class="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500 bg-gray-50"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">ΑΦΜ</label><input type="text" id="afm" class="w-full border-2 p-3 rounded-xl outline-none bg-gray-50"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Email</label><input type="email" id="email" class="w-full border-2 p-3 rounded-xl outline-none bg-gray-50"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Υπεύθυνος</label><input type="text" id="manager" class="w-full border-2 p-3 rounded-xl outline-none bg-gray-50"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">ΑΜ (ΤΣΑΥ)</label><input type="text" id="am" class="w-full border-2 p-3 rounded-xl outline-none bg-gray-50"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">ΓΕΜΗ</label><input type="text" id="gemi" class="w-full border-2 p-3 rounded-xl outline-none bg-gray-50"></div>
                <div class="md:col-span-2"><label class="text-[10px] font-bold text-gray-400 uppercase">Διεύθυνση</label><input type="text" id="address" class="w-full border-2 p-3 rounded-xl outline-none bg-gray-50"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Πόλη</label><input type="text" id="city" class="w-full border-2 p-3 rounded-xl outline-none bg-gray-50"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">ΤΚ</label><input type="text" id="zip" class="w-full border-2 p-3 rounded-xl outline-none bg-gray-50"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Κινητό</label><input type="tel" id="mobile" class="w-full border-2 p-3 rounded-xl outline-none bg-gray-50"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Σταθερό</label><input type="tel" id="phone" class="w-full border-2 p-3 rounded-xl outline-none bg-gray-50"></div>
                
                <div class="md:col-span-2 mt-4 p-5 bg-blue-50 rounded-2xl border border-blue-100 text-sm space-y-4">
                    <p class="text-blue-900 italic font-medium text-center">Παρέχεται δωρεάν από τον Παναγιώτη Ζαρογουλίδη.</p>
                    <div class="space-y-2">
                        <label class="flex items-center space-x-3"><input type="checkbox" id="promoConsent" checked class="w-5 h-5"> <span>Συγκατάθεση Zarkolia Health</span></label>
                        <label class="flex items-center space-x-3 font-bold"><input type="checkbox" id="gdprConsent" checked class="w-5 h-5"> <span>Αποδοχή GDPR</span></label>
                    </div>
                </div>
                <button type="button" onclick="handleAction('register', this)" class="md:col-span-2 bg-blue-900 text-white py-4 rounded-2xl font-bold shadow-lg">ΟΛΟΚΛΗΡΩΣΗ ΕΓΓΡΑΦΗΣ</button>
            </form>
        </section>

        <section id="request" class="section-content hidden bg-white p-8 rounded-3xl shadow-sm border">
            <h2 class="text-2xl font-bold mb-6 text-green-800 border-b pb-4">Υποβολή Αιτήματος</h2>
            <div class="space-y-4">
                <input type="email" id="reqEmail" placeholder="Το Email εγγραφής σας" class="w-full border-2 p-4 rounded-xl outline-none focus:border-green-500 font-bold bg-green-50/30">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <input type="text" id="drugBarcode" oninput="searchByBarcode()" placeholder="Barcode" class="border-2 p-4 rounded-xl bg-green-50 font-black text-center outline-none">
                    <input type="text" id="drug" list="drugList" placeholder="Όνομα Φαρμάκου" class="md:col-span-2 border-2 p-4 rounded-xl font-bold outline-none"><datalist id="drugList"></datalist>
                </div>
                <div id="priceInfo" class="hidden p-5 bg-blue-50 border-2 border-blue-100 rounded-2xl flex justify-between">
                    <div><span class="text-[10px] font-bold text-blue-800 uppercase">ΧΤ</span><br><span id="dispXT" class="font-bold text-xl"></span></div>
                    <div class="text-right border-l-2 border-blue-100 pl-4"><span class="text-[10px] font-bold text-green-800 uppercase">ΛΤ</span><br><span id="dispLT" class="font-bold text-xl text-green-700"></span></div>
                </div>
                <input type="number" id="qty" value="1" class="w-full border-2 p-4 rounded-xl text-center font-bold">
                <button type="button" onclick="handleAction('request', this)" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg">ΔΗΜΟΣΙΕΥΣΗ</button>
            </div>
        </section>

        <section id="my-requests" class="section-content hidden bg-white p-8 rounded-3xl shadow-sm border">
            <h2 class="text-2xl font-bold mb-6 text-blue-900 border-b pb-4">Τα Αιτήματά μου</h2>
            <div class="flex gap-2 mb-6">
                <input type="email" id="searchEmail" placeholder="Το Email σας" class="flex-1 border-2 p-4 rounded-xl outline-none">
                <button onclick="fetchMyRequests()" class="bg-blue-900 text-white px-8 rounded-xl font-bold">ΕΛΕΓΧΟΣ</button>
            </div>
            <div id="resultsArea" class="space-y-4"></div>
        </section>

        <section id="tracking" class="section-content hidden bg-white p-8 rounded-3xl shadow-sm border text-center">
            <h2 class="text-2xl font-bold mb-6 text-orange-700 border-b pb-4">Tracking</h2>
            <input type="text" id="trackReqId" placeholder="ID Αιτήματος" class="w-full border-2 p-4 rounded-xl mb-4 outline-none focus:border-orange-500 font-bold text-center">
            <input type="text" id="qrcode" placeholder="Serial Number (QR)" class="w-full border-2 p-4 rounded-xl mb-4 text-center">
            <button type="button" onclick="handleAction('tracking', this)" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg">ΚΑΤΑΧΩΡΗΣΗ</button>
        </section>
    </div>

    <script>
        const APP_URL = "https://script.google.com/macros/s/AKfycby8NfHk9Id5e_zr35FKWzSea0Uc_tVIVqnumDtvSv9L9sl_eLGHLwzYyCxFh5hrpZai/exec";
        let drugsDatabase = [];

        window.addEventListener('DOMContentLoaded', async () => {
            const resp = await fetch(APP_URL + "?action=getDrugs");
            drugsDatabase = await resp.json();
            const dl = document.getElementById('drugList');
            drugsDatabase.forEach(d => { let opt = document.createElement('option'); opt.value = d.name; dl.appendChild(opt); });
        });

        function showSection(id) { 
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden')); 
            document.getElementById(id).classList.remove('hidden'); 
        }

        async function fetchMyRequests() {
            const email = document.getElementById('searchEmail').value.trim();
            const area = document.getElementById('resultsArea');
            if(!email) return alert("Βάλτε το email σας");
            area.innerHTML = "<p class='text-center animate-pulse'>Αναζήτηση...</p>";
            const r = await fetch(APP_URL + "?action=myRequests&email=" + email);
            const data = await r.json();
            if(data.length === 0) { area.innerHTML = "Δεν βρέθηκαν αιτήματα."; return; }
            area.innerHTML = data.map(req => `
                <div class="border-2 p-5 rounded-3xl ${req.status === 'Βρέθηκε' ? 'bg-green-50 border-green-200' : 'bg-gray-50'}">
                    <div class="flex justify-between font-bold mb-2 italic"><span>ID: ${req.id}</span><span>${req.status}</span></div>
                    <div class="text-lg font-bold">${req.drug}</div>
                    ${req.status === 'Βρέθηκε' ? `
                        <div class="mt-4 p-4 bg-white rounded-2xl border border-green-100 shadow-sm text-sm">
                            <p class="text-green-800 font-bold mb-3 italic tracking-tight"><i class="fas fa-id-card mr-2"></i>ΣΤΟΙΧΕΙΑ ΣΥΝΑΔΕΛΦΟΥ ΠΟΥ ΣΑΣ ΚΑΛΥΠΤΕΙ:</p>
                            <div class="space-y-1 text-gray-700">
                                <p class="flex justify-between"><span>Φαρμακείο:</span> <b class="text-gray-900">${req.helperName}</b></p>
                                <p class="flex justify-between"><span>Τηλέφωνο:</span> <b class="text-blue-700 text-lg">${req.helperPhone}</b></p>
                                <p class="flex justify-between"><span>Email:</span> <b class="text-gray-600">${req.helperEmail}</b></p>
                            </div>
                            <a href="tel:${req.helperPhone}" class="mt-4 block text-center bg-blue-900 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">Καλέστε Τώρα</a>
                        </div>` : ''}
                </div>`).reverse().join('');
        }

        function fillDrugData(d) {
            document.getElementById('drugBarcode').value = d.barcode;
            document.getElementById('drug').value = d.name;
            document.getElementById('priceInfo').classList.remove('hidden');
            let xtVal = String(d.xt).replace(',','.'); let ltVal = String(d.lt).replace(',','.');
            document.getElementById('dispXT').innerText = parseFloat(xtVal).toFixed(2) + "€";
            document.getElementById('dispLT').innerText = parseFloat(ltVal).toFixed(2) + "€";
        }

        function searchByBarcode() {
            const bc = document.getElementById('drugBarcode').value.trim();
            const d = drugsDatabase.find(x => x.barcode == bc);
            if(d) fillDrugData(d); else document.getElementById('priceInfo').classList.add('hidden');
        }

        document.getElementById('drug').oninput = function() {
            const d = drugsDatabase.find(x => x.name === this.value.trim());
            if(d) fillDrugData(d); else { document.getElementById('priceInfo').classList.add('hidden'); document.getElementById('drugBarcode').value = ''; }
        };

        async function handleAction(type, btn) {
            const oldT = btn.innerText; btn.innerText = "Περιμένετε..."; btn.disabled = true;
            let p = { action: type };
            if(type === 'register') {
                ['name','afm','email','manager','am','gemi','address','city','zip','mobile','phone'].forEach(f => p[f] = document.getElementById(f).value);
                p.promoConsent = document.getElementById('promoConsent').checked ? "ΝΑΙ" : "ΟΧΙ";
                p.gdprConsent = "ΑΠΟΔΟΧΗ";
            } else if(type === 'request') {
                p.requesterEmail = document.getElementById('reqEmail').value;
                p.qty = document.getElementById('qty').value;
                p.drugNameOnly = document.getElementById('drug').value;
                p.drug = p.drugNameOnly + " (XT: " + document.getElementById('dispXT').innerText + ")";
            } else if(type === 'tracking') { 
                p.reqId = document.getElementById('trackReqId').value; 
                p.qrcode = document.getElementById('qrcode').value; 
            }

            try {
                await fetch(APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
                alert("Ολοκληρώθηκε!");
                if(type === 'register') showSection('request');
            } catch(e) { console.error(e); }
            finally { btn.innerText = oldT; btn.disabled = false; }
        }
    </script>
</body>
</html>
